<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RASHISA 会員台帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#20241f;
    --paper:#f7f4ec;
    --paper-raised:#fffdf8;
    --line:#ddd5bf;
    --line-strong:#20241f;
    --brass:#a5793a;
    --brass-deep:#7c5726;
    --forest:#33553f;
    --forest-soft:#e5ede7;
    --amber:#c48a2e;
    --amber-soft:#f6e9d3;
    --rust:#a5432b;
    --rust-soft:#f3ded7;
    --slate:#6b7062;
    --shadow: 0 1px 0 rgba(32,36,31,0.05), 0 6px 18px rgba(32,36,31,0.05);
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--paper); color:var(--ink); font-family:'Noto Sans JP', sans-serif; -webkit-font-smoothing:antialiased; }
  .app{ display:flex; min-height:100vh; }
  ::selection{ background:var(--amber-soft); }

  /* ---- Sidebar ---- */
  .sidebar{ width:226px; flex-shrink:0; background:var(--ink); color:var(--paper); padding:28px 18px; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; }
  .brand{ margin-bottom:34px; }
  .brand .mark{ font-family:'Zen Kaku Gothic New', sans-serif; font-weight:900; font-size:12.5px; letter-spacing:.14em; color:var(--brass); text-transform:uppercase; }
  .brand h1{ font-family:'Zen Kaku Gothic New', sans-serif; font-size:19px; font-weight:700; margin:6px 0 0; line-height:1.4; }
  .nav{ display:flex; flex-direction:column; gap:2px; }
  .nav button{ all:unset; cursor:pointer; padding:11px 12px; border-radius:6px; font-size:13.5px; font-weight:500; color:#cfd0c6; display:flex; align-items:center; gap:10px; transition:background .15s, color .15s; }
  .nav button .num{ font-family:'JetBrains Mono', monospace; font-size:11px; color:#7c8074; width:18px; }
  .nav button:hover{ background:rgba(255,255,255,0.06); color:#fff; }
  .nav button.active{ background:var(--brass); color:#1a1608; font-weight:700;}
  .nav button.active .num{ color:#3a2c10; }
  .nav-badge{ margin-left:auto; background:var(--rust); color:#fff; font-size:10.5px; font-weight:700; padding:1px 7px; border-radius:20px; }
  .nav button.active .nav-badge{ background:#1a1608; color:var(--amber-soft); }
  .sidebar-foot{ margin-top:auto; padding-top:16px; border-top:1px solid rgba(255,255,255,0.12); font-size:11px; color:#8b8f81; line-height:1.7; }
  .sidebar-foot b{ color:#cfd0c6; }
  .sync-dot{ display:inline-block; width:6px; height:6px; border-radius:50%; background:#7fbf94; margin-right:5px; }

  /* ---- Main ---- */
  .main{ flex:1; padding:32px 40px 90px; max-width:1320px; }
  .page-head{ display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:20px; flex-wrap:wrap; gap:14px;}
  .page-head h2{ font-family:'Zen Kaku Gothic New', sans-serif; font-size:25px; font-weight:700; margin:0 0 4px; }
  .page-head p{ margin:0; color:var(--slate); font-size:13px; }
  .ledger-rule{ height:2px; background:var(--line-strong); margin-bottom:26px; position:relative;}
  .ledger-rule::after{ content:""; position:absolute; left:0; top:5px; width:100%; height:1px; background:var(--line);}

  .btn{ all:unset; cursor:pointer; font-family:'Noto Sans JP',sans-serif; font-size:13px; font-weight:600; padding:9px 16px; border-radius:5px; display:inline-flex; align-items:center; gap:6px; transition:opacity .15s, transform .1s; }
  .btn:active{ transform:translateY(1px); }
  .btn-primary{ background:var(--ink); color:var(--paper); }
  .btn-primary:hover{ opacity:.85; }
  .btn-brass{ background:var(--brass); color:#1a1608; }
  .btn-brass:hover{ opacity:.85; }
  .btn-ghost{ background:transparent; color:var(--ink); border:1px solid var(--line-strong); }
  .btn-danger{ background:var(--rust); color:#fff; }
  .btn-danger:hover{ opacity:.85; }
  .btn-ghost:hover{ background:rgba(32,36,31,0.05); }
  .btn-sm{ padding:6px 11px; font-size:12px; }
  .btn[disabled]{ opacity:.35; cursor:default; }

  /* ---- Stat cards ---- */
  .stats-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:30px; }
  .stat-card{ background:var(--paper-raised); border:1px solid var(--line); border-radius:8px; padding:16px 18px; box-shadow:var(--shadow); }
  .stat-card .label{ font-size:11.5px; color:var(--slate); font-weight:600; letter-spacing:.03em;}
  .stat-card .value{ font-family:'JetBrains Mono', monospace; font-size:26px; font-weight:600; margin-top:6px; color:var(--ink); }
  .stat-card .sub{ font-size:11px; color:var(--slate); margin-top:4px;}
  .stat-card.accent .value{ color:var(--brass-deep); }
  .stat-card.warn .value{ color:var(--rust); }

  /* ---- Toolbar ---- */
  .toolbar{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px;}
  .toolbar input[type=text], .toolbar select{ font-family:'Noto Sans JP',sans-serif; border:1px solid var(--line-strong); border-radius:5px; padding:8px 10px; font-size:13px; background:var(--paper-raised); color:var(--ink); }
  .toolbar input[type=text]{ min-width:220px; }
  .toolbar .spacer{ flex:1; }
  .chip{ display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11.5px; font-weight:700; white-space:nowrap; }
  .chip-一括{ background:var(--forest-soft); color:var(--forest); }
  .chip-月額{ background:var(--amber-soft); color:var(--brass-deep); }
  .chip-クレジット{ background:#e4e6f5; color:#3f4694; }
  .chip-未設定{ background:#eceae2; color:var(--slate); }
  .chip-継続中{ background:var(--forest-soft); color:var(--forest); }
  .chip-解約{ background:var(--rust-soft); color:var(--rust); }
  .chip-休会{ background:var(--amber-soft); color:var(--brass-deep); }
  .chip-破棄{ background:#e6e4dc; color:#5c5f56; }
  .chip-ok{ background:var(--forest-soft); color:var(--forest); }
  .chip-warn{ background:var(--rust-soft); color:var(--rust); }

  /* ---- Table ---- */
  .table-wrap{ background:var(--paper-raised); border:1px solid var(--line); border-radius:8px; overflow:hidden; overflow-x:auto; }
  table{ width:100%; border-collapse:collapse; font-size:12.8px; }
  thead th{ text-align:left; padding:11px 12px; font-size:11px; font-weight:700; color:var(--slate); text-transform:uppercase; letter-spacing:.04em; border-bottom:2px solid var(--line-strong); background:#f1ece0; white-space:nowrap; position:sticky; top:0; }
  tbody td{ padding:11px 12px; border-bottom:1px solid var(--line); vertical-align:middle; white-space:nowrap;}
  tbody tr{ cursor:pointer; }
  tbody tr:hover{ background:#faf5e9; }
  tbody tr:last-child td{ border-bottom:none;}
  td.company{ font-weight:700; white-space:normal; max-width:220px; color:var(--ink); }
  td.company .rep-sub{ display:block; font-weight:400; font-size:11px; color:var(--slate); margin-top:2px;}
  td.amount{ font-family:'JetBrains Mono',monospace; text-align:right; }
  .row-actions{ display:flex; gap:6px; }
  .icon-btn{ all:unset; cursor:pointer; padding:5px 9px; border-radius:4px; font-size:11.5px; border:1px solid var(--line-strong); color:var(--ink); }
  .icon-btn:hover{ background:var(--ink); color:var(--paper); }
  .empty-state{ padding:50px 20px; text-align:center; color:var(--slate); font-size:13.5px;}

  /* ---- Reminder sections ---- */
  .alert-section{ margin-bottom:30px; }
  .alert-section-head{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .alert-section-head h3{ font-family:'Zen Kaku Gothic New',sans-serif; font-size:15.5px; margin:0; }
  .alert-section-head .count{ font-family:'JetBrains Mono',monospace; font-size:12px; background:var(--ink); color:var(--paper); padding:2px 9px; border-radius:20px; }
  .alert-section-head .desc{ font-size:12px; color:var(--slate); margin-left:2px; }
  .alert-section-head .spacer{ flex:1; }
  .reminder-card{ background:var(--paper-raised); border:1px solid var(--line); border-left:4px solid var(--slate); border-radius:6px; padding:13px 16px; margin-bottom:9px; display:flex; justify-content:space-between; align-items:center; gap:14px; flex-wrap:wrap; }
  .reminder-card.due-soon{ border-left-color:var(--amber); }
  .reminder-card.overdue{ border-left-color:var(--rust); }
  .reminder-card .rc-main{ display:flex; flex-direction:column; gap:3px; cursor:pointer; }
  .reminder-card .rc-company{ font-weight:700; font-size:14px; }
  .reminder-card .rc-meta{ font-size:12px; color:var(--slate); display:flex; gap:12px; flex-wrap:wrap;}
  .reminder-card .rc-date{ font-family:'JetBrains Mono',monospace; font-weight:700; font-size:12.5px; }
  .badge-days{ padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; }
  .badge-overdue{ background:var(--rust-soft); color:var(--rust); }
  .badge-soon{ background:var(--amber-soft); color:var(--brass-deep); }
  .badge-later{ background:#eceae2; color:var(--slate); }
  .alert-empty{ font-size:12.5px; color:var(--slate); padding:14px 4px; }

  /* ---- Dashboard ---- */
  .dash-grid{ display:grid; grid-template-columns:1.1fr 1fr; gap:20px; margin-bottom:26px;}
  @media (max-width:900px){ .dash-grid{ grid-template-columns:1fr; } }
  .panel{ background:var(--paper-raised); border:1px solid var(--line); border-radius:8px; padding:20px; }
  .panel h3{ font-family:'Zen Kaku Gothic New',sans-serif; font-size:14.5px; margin:0 0 14px; display:flex; justify-content:space-between; align-items:center;}
  .legend{ display:flex; flex-direction:column; gap:9px; margin-top:14px; }
  .legend-row{ display:flex; align-items:center; gap:9px; font-size:12.5px; }
  .legend-dot{ width:10px; height:10px; border-radius:2px; flex-shrink:0; }
  .legend-row .lbl{ flex:1; }
  .legend-row .val{ font-family:'JetBrains Mono',monospace; font-weight:700; }
  .bar-row{ display:grid; grid-template-columns:110px 1fr 70px; gap:10px; align-items:center; font-size:12px; margin-bottom:10px;}
  .bar-track{ background:#efe9db; border-radius:4px; height:16px; overflow:hidden; }
  .bar-fill{ height:100%; border-radius:4px; }
  .channel-list{ display:flex; flex-direction:column; gap:8px; }

  /* ---- Modal ---- */
  .overlay{ position:fixed; inset:0; background:rgba(20,20,16,0.45); display:none; align-items:flex-start; justify-content:center; padding:40px 20px; overflow-y:auto; z-index:50;}
  .overlay.show{ display:flex; }
  .modal{ background:var(--paper-raised); border-radius:10px; width:100%; max-width:760px; padding:0; box-shadow:0 20px 60px rgba(0,0,0,0.3); overflow:hidden;}
  .modal-head{ padding:22px 28px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; background:#f1ece0;}
  .modal-head h3{ font-family:'Zen Kaku Gothic New',sans-serif; margin:0; font-size:19px;}
  .modal-head .status-toggle select{ font-family:'Noto Sans JP',sans-serif; font-weight:700; border:1px solid var(--line-strong); border-radius:20px; padding:5px 12px; font-size:12px;}
  .modal-body{ padding:22px 28px; max-height:64vh; overflow-y:auto; }
  .field-section{ margin-bottom:22px; }
  .field-section:last-child{ margin-bottom:0; }
  .field-section .sec-title{ font-family:'Zen Kaku Gothic New',sans-serif; font-size:12.5px; font-weight:700; color:var(--brass-deep); text-transform:uppercase; letter-spacing:.05em; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--line);}
  .form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px 14px; }
  .form-field{ display:flex; flex-direction:column; gap:5px; }
  .form-field.full{ grid-column:1/-1; }
  .form-field label{ font-size:11.5px; font-weight:700; color:var(--slate); }
  .form-field input, .form-field select, .form-field textarea{ font-family:'Noto Sans JP',sans-serif; border:1px solid var(--line-strong); border-radius:5px; padding:8px 10px; font-size:13px; background:#fff; color:var(--ink); }
  .form-field textarea{ resize:vertical; min-height:52px; }
  .modal-foot{ display:flex; justify-content:space-between; align-items:center; gap:10px; padding:16px 28px; border-top:1px solid var(--line); background:#f1ece0;}

  /* ---- Settings ---- */
  .settings-panel{ max-width:580px; }
  .settings-panel .form-field{ margin-bottom:16px; }
  .note{ font-size:12px; color:var(--slate); line-height:1.7; background:#f1ece0; border:1px solid var(--line); border-radius:6px; padding:12px 14px; margin-top:6px;}
  .note b{ color:var(--ink); }

  /* ---- Toast ---- */
  .toast-wrap{ position:fixed; bottom:22px; right:22px; display:flex; flex-direction:column; gap:8px; z-index:100; }
  .toast{ background:var(--ink); color:var(--paper); padding:11px 16px; border-radius:6px; font-size:13px; box-shadow:0 8px 24px rgba(0,0,0,0.25); min-width:200px; animation:toastin .2s ease-out; }
  .toast.success{ background:var(--forest); }
  .toast.error{ background:var(--rust); }
  @keyframes toastin{ from{ transform:translateY(8px); opacity:0;} to{ transform:translateY(0); opacity:1;} }
  .loading-row{ padding:60px; text-align:center; color:var(--slate); font-size:13px;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand">
      <div class="mark">RASHISA PHILOSOPHY SALON</div>
      <h1>会員台帳</h1>
    </div>
    <div class="nav">
      <button data-tab="members" class="active"><span class="num">01</span>会員一覧</button>
      <button data-tab="alerts"><span class="num">02</span>アラート<span class="nav-badge" id="navAlertBadge">0</span></button>
      <button data-tab="dashboard"><span class="num">03</span>ダッシュボード</button>
      <button data-tab="settings"><span class="num">04</span>設定</button>
    </div>
    <div class="sidebar-foot">
      <div><span class="sync-dot"></span><b>共有データ</b> — このURLを開く社内の全員が同じ会員データを閲覧・編集できます。</div>
    </div>
  </div>
  <div class="main" id="main">
    <div class="loading-row" id="loadingRow">データを読み込んでいます…</div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">会員を追加</h3>
      <div class="status-toggle" id="statusToggleWrap" style="display:none;">
        <select id="statusSelect"><option value="継続中">継続中</option><option value="休会">休会</option><option value="解約">解約</option><option value="破棄">破棄</option></select>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="deleteBtn" style="display:none;">この会員を削除</button>
      <div style="display:flex; gap:10px; margin-left:auto;">
        <button class="btn btn-ghost" id="cancelBtn">キャンセル</button>
        <button class="btn btn-primary" id="saveBtn">保存する</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

function uid(){ return Date.now() + Math.floor(Math.random()*1000); }
function esc(s){ if(s===null||s===undefined) return ''; return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function yen(n){ if(n===null||n===undefined||n==='') return '—'; const num = Number(n); if(isNaN(num)) return esc(n); return '¥' + num.toLocaleString('ja-JP'); }
function fmtDate(s){ if(!s || s==='—') return '—'; const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(s); if(m) return `${m[1]}/${m[2]}/${m[3]}`; return esc(s); }
function isRealDate(s){ return typeof s === 'string' && /^\d{4}-\d{2}-\d{2}/.test(s); }
function daysUntil(dateStr){ const target = new Date(dateStr+'T00:00:00'); const today = new Date(); today.setHours(0,0,0,0); return Math.round((target-today)/86400000); }
function isContractSigned(m){ return m.contractDoc && CONTRACT_DONE_HINTS.some(h=>m.contractDoc.includes(h)); }

function toast(msg, type){
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast ' + (type||'');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(), 4200);
}

const DEFAULT_BACKEND_URL = 'https://script.google.com/macros/s/AKfycbxNhmTnpvdOQWVZiDTau-rlTtHfwA5SpyKXHvR9oVj0lnW-6pbXBrk6-cEkzVYLAbpO/exec';
const BACKEND_KEY = 'rashisa_backend_url';
function getBackendUrl(){ return localStorage.getItem(BACKEND_KEY) || DEFAULT_BACKEND_URL; }
function setBackendUrl(u){ localStorage.setItem(BACKEND_KEY, u); }

async function apiGet(key){
  const url = getBackendUrl();
  if(!url) throw new Error('backend未設定');
  const res = await fetch(url + '?key=' + encodeURIComponent(key) + '&_=' + Date.now(), { cache:'no-store' });
  if(!res.ok) throw new Error('サーバーエラー(' + res.status + ')');
  const text = await res.text();
  if(!text || text==='null') return null;
  return JSON.parse(text);
}
async function apiSet(key, value){
  const url = getBackendUrl();
  if(!url) throw new Error('backend未設定');
  const res = await fetch(url, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({key, value: JSON.stringify(value)}), cache:'no-store' });
  if(!res.ok) throw new Error('サーバーエラー(' + res.status + ')');
  let body;
  try{ body = JSON.parse(await res.text()); }catch(e){ body = null; }
  if(body && body.ok === false) throw new Error(body.error === 'busy' ? '保存が混み合っています。少し待ってもう一度お試しください' : (body.error || '保存に失敗しました'));
}

let dataLoadError = false;
async function loadData(){
  dataLoadError = false;
  try{
    const m = await apiGet('members');
    if(m){
      members = m;
    } else if(!members || !members.length){
      // 本当に初回のみ、Excel取り込み時点のデータで初期化する
      members = INITIAL_MEMBERS;
      await apiSet('members', INITIAL_MEMBERS);
    }
    // m が null で既に members がある場合は、今表示している内容をそのまま維持する（勝手に古いデータへ戻さない）
  }catch(e){
    dataLoadError = true;
    toast('データの読み込みに失敗しました（' + e.message + '）。保存先URLの接続状況をご確認ください。', 'error');
    // 通信エラー時は今の画面の内容をそのまま維持し、勝手に取り込み時点のデータへ戻さない
  }
  try{
    const s = await apiGet('settings');
    settings = s || {slackWebhook:''};
  }catch(e){ settings = settings || {slackWebhook:''}; }
}
async function apiSetVerified(key, value){
  await apiSet(key, value);
  await new Promise(r=>setTimeout(r, 600));
  const check = async ()=>{
    try{ return await apiGet(key); }catch(e){ return undefined; }
  };
  let confirmed = await check();
  if(confirmed !== undefined && JSON.stringify(confirmed) === JSON.stringify(value)) return true;
  if(confirmed === undefined) return true; // 確認自体が失敗しただけとみなし、保存は成功扱いにする
  // 反映されていなかった場合は一度だけ再送する
  await apiSet(key, value);
  await new Promise(r=>setTimeout(r, 600));
  confirmed = await check();
  if(confirmed !== undefined && JSON.stringify(confirmed) === JSON.stringify(value)) return true;
  return false;
}

    const ok = await apiSetVerified('members', members);

}

/* ---------------- Alert computation ---------------- */
function computeAlerts(){
  const active = members.filter(m=>m.status==='継続中');
  const renewal = active.filter(m=>isRealDate(m.renewalDate)).map(m=>({...m,_days:daysUntil(m.renewalDate)})).filter(m=>m._days<=30).sort((a,b)=>a._days-b._days);
  const invoice = active.filter(m=>isRealDate(m.nextInvoiceDate)).map(m=>({...m,_days:daysUntil(m.nextInvoiceDate)})).filter(m=>m._days<=14).sort((a,b)=>a._days-b._days);
  const paymentOverdue = active.filter(m=>isRealDate(m.nextPaymentDueDate)).map(m=>({...m,_days:daysUntil(m.nextPaymentDueDate)})).filter(m=>m._days<0).sort((a,b)=>a._days-b._days);
  const noInterview = active.filter(m=>!m.interviewDone).sort((a,b)=>(a.company||'').localeCompare(b.company||''));
  const noContract = active.filter(m=>!isContractSigned(m)).sort((a,b)=>(a.company||'').localeCompare(b.company||''));
  return {renewal, invoice, paymentOverdue, noInterview, noContract};
}

function alertCard(m, dateField, dateLabel){
  const days = m._days;
  const cls = days<0 ? 'overdue' : (days<=14 ? 'due-soon' : '');
  const badgeCls = days<0 ? 'badge-overdue' : (days<=14 ? 'badge-soon' : 'badge-later');
  const badgeText = days<0 ? `${Math.abs(days)}日超過` : (days===0 ? '本日' : `あと${days}日`);
  return `
    <div class="reminder-card ${cls}">
      <div class="rc-main" data-open="${m.id}">
        <div class="rc-company">${esc(m.company)} <span class="badge-days ${badgeCls}">${badgeText}</span></div>
        <div class="rc-meta">
          <span>担当: ${esc(m.repName||'—')}</span>
          <span>形態: ${esc(m.paymentCategory)}</span>
          <span class="rc-date">${dateLabel} ${fmtDate(m[dateField])}</span>

      </div>
      <div class="row-actions">
        <button class="btn btn-brass btn-sm" data-send="${m.id}" data-reason="${dateLabel}">Slackへ送信</button>
        <button class="icon-btn" data-copy="${m.id}" data-reason="${dateLabel}" title="コピー">📋</button>
      </div>
    </div>
  `;
}

function renderDashboard(){
  const active = members.filter(m=>m.status==='継続中');
  const cats = ['一括','月額','クレジット','未設定'];
  const catCounts = cats.map(c=>active.filter(m=>m.paymentCategory===c).length);
  const total = active.length || 1;
  const mrr = active.reduce((s,m)=>s + (Number(m.monthlyAmount)||0), 0);
  const yearly = active.reduce((s,m)=>s + (Number(m.amount)||0), 0);
  const a = computeAlerts();
  const alertTotal = a.renewal.length + a.invoice.length + a.paymentOverdue.length + a.noInterview.length + a.noContract.length;

  let offset = 0;
  const R = 60, C = 2*Math.PI*R;
  const segs = cats.map((c,i)=>{
    const v = catCounts[i]; const frac = v/total; const dash = frac*C;
    const seg = `<circle cx="90" cy="90" r="${R}" fill="none" stroke="${CAT_COLORS[c]}" stroke-width="22" stroke-dasharray="${dash} ${C-dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 90 90)"/>`;
    offset += dash; return seg;
  }).join('');

  const channelCounts = {};
  active.forEach(m=>{ const c = m.channel || '不明'; channelCounts[c] = (channelCounts[c]||0)+1; });
  const topChannels = Object.entries(channelCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxCh = Math.max(...topChannels.map(c=>c[1]),1);

  return `
    <div class="page-head"><div><h2>ダッシュボード</h2><p>継続中の会員 ${active.length} 件（全 ${members.length} 件中）を集計しています。</p></div></div>
    <div class="ledger-rule"></div>
    <div class="stats-grid">
      <div class="stat-card accent"><div class="label">継続中の会員数</div><div class="value">${active.length}</div><div class="sub">全${members.length}件（休会・解約・破棄 ${members.length-active.length}件）</div></div>
      <div class="stat-card"><div class="label">月次売上目安（月割換算合計）</div><div class="value">${yen(mrr)}</div><div class="sub">継続中会員の月割金額の合計</div></div>
      <div class="stat-card"><div class="label">年間契約金額の合計</div><div class="value">${yen(yearly)}</div><div class="sub">継続中会員の契約金額合計</div></div>
      <div class="stat-card warn"><div class="label">要対応アラート</div><div class="value">${alertTotal}</div><div class="sub">アラートタブで内訳を確認</div></div>
    </div>
    <div class="dash-grid">
      <div class="panel">
        <h3>支払い形態の内訳</h3>
        <div style="display:flex; align-items:center; gap:24px; flex-wrap:wrap;">
          <svg width="180" height="180" viewBox="0 0 180 180">${segs}</svg>
          <div class="legend">${cats.map((c,i)=>`<div class="legend-row"><span class="legend-dot" style="background:${CAT_COLORS[c]}"></span><span class="lbl">${c}</span><span class="val">${catCounts[i]}件</span></div>`).join('')}</div>
        </div>
      </div>
      <div class="panel">
        <h3>獲得チャネル 上位</h3>
        <div class="channel-list">
          ${topChannels.map(([name,count])=>`
            <div class="bar-row">
              <div>${esc(name)}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${(count/maxCh*100)}%; background:var(--brass);"></div></div>
              <div style="text-align:right; font-family:'JetBrains Mono',monospace;">${count}件</div>
            </div>
          `).join('') || '<div class="empty-state">データがありません</div>'}
        </div>
      </div>
    </div>
  `;
}

document.getElementById('saveBtn').onclick = async ()=>{

  document.querySelectorAll('[data-field]').forEach(el=>{ data[el.dataset.field] = el.value; });

    members.push({id: uid(), status:'継続中', ...data});

  }
  await saveMembers();
  document.getElementById('overlay').classList.remove('show');

};

async function deleteMember(id){
  const m = members.find(x=>x.id===id);
  if(!confirm(`「${m.company}」を削除します。よろしいですか？`)) return;
  members = members.filter(x=>x.id!==id);
  await saveMembers();
  toast('削除しました','success');
  render();
}

function exportCSV(){
  const headers = ALL_FIELDS.map(f=>f.label);
  const keys = ALL_FIELDS.map(f=>f.key);
  const rows = members.map(m=>keys.map(k=>{ let v = m[k]; if(v===null||v===undefined) v=''; return `"${String(v).replace(/"/g,'""')}"`; }).join(','));
  const csv = '\uFEFF' + headers.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'RASHISA_会員一覧.csv'; a.click();
  URL.revokeObjectURL(url);
}

/* ---------------- Slack ---------------- */
async function sendToSlack(text){
  if(!settings.slackWebhook){ toast('先に設定画面でSlack Webhook URLを登録してください','error'); return false; }
  try{
    const body = 'payload=' + encodeURIComponent(JSON.stringify({text}));
    await fetch(settings.slackWebhook, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body });
    toast('Slackに送信しました（送信結果は画面上では確認できません）','success');
    return true;
  }catch(e){ toast('送信中にエラーが発生しました: ' + e.message, 'error'); return false; }
}
function sendSlackForMember(m, reason){
  const text = `📋 *${reason || 'リマインド'}*\n・企業名: ${m.company}\n・担当者: ${m.repName||'—'}\n・更新日: ${fmtDate(m.renewalDate)}\n・次回請求日: ${fmtDate(m.nextInvoiceDate)}\n・金額: ${yen(m.amount)}\n・支払い形態: ${m.paymentCategory}`;
  sendToSlack(text);
}

/* ---------------- Copy to clipboard (primary, reliable path) ---------------- */
async function copyText(text){
  try{
    await navigator.clipboard.writeText(text);
    return true;
  }catch(e){
    try{
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      return true;
    }catch(e2){ return false; }
  }
}
async function copyMemberMessage(m, reason){
  const text = `📋 *${reason || 'リマインド'}*\n・企業名: ${m.company}\n・担当者: ${m.repName||'—'}\n・更新日: ${fmtDate(m.renewalDate)}\n・次回請求日: ${fmtDate(m.nextInvoiceDate)}\n・入金予定日: ${fmtDate(m.nextPaymentDueDate)}\n・金額: ${yen(m.amount)}\n・支払い形態: ${m.paymentCategory}`;
  const ok = await copyText(text);
  toast(ok ? 'コピーしました。Slackに貼り付けてください' : 'コピーに失敗しました。手動で選択してコピーしてください', ok?'success':'error');
}
async function copyBulkMessage(sectionId){
  const cfg = alertMap()[sectionId];
  if(!cfg || !cfg.items.length) return;
  const text = `📋 *${cfg.title}（${cfg.items.length}件）*\n` + cfg.items.map(cfg.line).join('\n');
  const ok = await copyText(text);
  toast(ok ? 'コピーしました。Slackに貼り付けてください' : 'コピーに失敗しました。手動で選択してコピーしてください', ok?'success':'error');
}

/* ---------------- Init ---------------- */
async function boot(){
  if(!getBackendUrl()){ renderSetupScreen(); return; }
  await loadData();
  render();
}
boot();
</script>
